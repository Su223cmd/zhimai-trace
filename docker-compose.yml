version: '3.8'

services:
  postgres:
    image: postgres:16
    container_name: cognitive_diagnosis_postgres
    environment:
      POSTGRES_DB: cognitive_diagnosis
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: cognitive_diagnosis_backend
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/cognitive_diagnosis
      ALLOWED_ORIGINS: http://localhost:5173,http://localhost:3000
    ports:
      - "8003:8003"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./backend/data:/app/data
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:8003/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: cognitive_diagnosis_frontend
    environment:
      VITE_API_BASE_URL: http://localhost:8003
    ports:
      - "5173:80"
    depends_on:
      backend:
        condition: service_healthy

volumes:
  postgres_data: